<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="OBIXCORE FPV Tuning Platform">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <radialGradient id="glow1" cx="22%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#00e87a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00e87a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#00d8ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00d8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="55%" stop-color="#00e87a"/>
      <stop offset="100%" stop-color="#00d8cc"/>
    </linearGradient>
    <linearGradient id="oGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c8ffe0"/>
      <stop offset="100%" stop-color="#00e87a"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e87a"/>
      <stop offset="100%" stop-color="#00d8cc"/>
    </linearGradient>
    <linearGradient id="obixGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#a8c0d8"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e87a"/>
      <stop offset="55%" stop-color="#00cc99"/>
      <stop offset="100%" stop-color="#00d8ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#00e87a" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- OX Icon Box — centered vertically, left-aligned -->
  <g transform="translate(120 195)">
    <!-- Box background -->
    <rect width="240" height="240" rx="48" fill="#07090d"/>
    <!-- Glow border -->
    <rect x="5" y="5" width="230" height="230" rx="45" fill="none"
      stroke="url(#borderGrad)" stroke-width="8" filter="url(#ringglow)" opacity="0.9"/>
    <rect x="8" y="8" width="224" height="224" rx="43" fill="none"
      stroke="url(#borderGrad)" stroke-width="3" opacity="0.5"/>

    <!-- O letter -->
    <g filter="url(#glow)">
      <path d="M28 82 L46 64 L96 64 L114 82 L114 122 L96 140 L46 140 L28 122 Z"
        fill="none" stroke="url(#oGrad)" stroke-width="13" stroke-linejoin="round"/>
      <path d="M48 90 L58 80 L84 80 L94 90 L94 114 L84 124 L58 124 L48 114 Z"
        fill="#07090d"/>
    </g>

    <!-- X letter -->
    <g filter="url(#glow)">
      <line x1="130" y1="64" x2="212" y2="140" stroke="url(#xGrad)" stroke-width="16" stroke-linecap="round"/>
      <line x1="212" y1="64" x2="130" y2="140" stroke="url(#xGrad)" stroke-width="16" stroke-linecap="round"/>
      <line x1="133" y1="67" x2="209" y2="137" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
      <line x1="209" y1="67" x2="133" y2="137" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- Divider -->
    <line x1="28" y1="165" x2="212" y2="165" stroke="#1e2a38" stroke-width="2"/>

    <!-- FPV tagline -->
    <text x="120" y="210" text-anchor="middle" fill="#00e87a"
      font-size="28" font-family="monospace" letter-spacing="14" opacity="0.75">FPV</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(400 220)">
    <!-- OBIX -->
    <text y="130"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-weight="900"
      font-size="130"
      letter-spacing="4"
      fill="url(#obixGrad)"
      filter="url(#textglow)">OBIX</text>

    <!-- CORE -->
    <text x="390" y="130"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-weight="900"
      font-size="130"
      letter-spacing="4"
      fill="url(#coreGrad)"
      filter="url(#textglow)">CORE</text>

    <!-- Tagline -->
    <line x1="0" y1="160" x2="55" y2="160" stroke="#00e87a" stroke-width="3" stroke-linecap="round"/>
    <text x="64" y="168"
      font-family="monospace" font-size="28" letter-spacing="10"
      fill="#6b7a90">FPV TUNING PLATFORM</text>
    <line x1="726" y1="160" x2="782" y2="160" stroke="#00e87a" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
